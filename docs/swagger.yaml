        type: string
      amp_api_port:
        type: integer
      amp_api_user:
        type: string
      amp_backup_dir:
        type: string
      amp_container:
        type: string
      amp_container_runtime:
        type: string
      amp_data_root:
        type: string
      amp_instance:
        description: AMP-specific.
        type: string
      amp_log_path:
        type: string
      amp_pg_bin:
        type: string
      amp_pg_lib:
        type: string
      amp_use_container:
        type: boolean
      amp_user:
        type: string
      auto_discover:
        type: boolean
      backup_dir:
        description: Paths.
        type: string
      broker_admin_addr:
        type: string
      broker_exec_prefix:
        type: string
      broker_game_addr:
        description: Broker — RabbitMQ for capture / notification.
        type: string
      broker_jwt_secret:
        type: string
      broker_pass:
        type: string
      broker_tls:
        type: boolean
      broker_user:
        type: string
      cmd_restart:
        type: string
      cmd_start:
        description: local-specific shell commands.
        type: string
      cmd_status:
        type: string
      cmd_stop:
        type: string
      control:
        description: Control plane.
        type: string
      control_namespace:
        type: string
      db_host:
        description: Database — always required per server.
        type: string
      db_name:
        type: string
      db_pass:
        type: string
      db_port:
        type: integer
      db_schema:
        type: string
      db_user:
        type: string
      default_ini_dir:
        type: string
      director_url:
        description: Director proxy.
        type: string
      docker_broker_admin:
        type: string
      docker_broker_game:
        type: string
      docker_db:
        type: string
      docker_gameserver:
        description: docker-specific container names.
        type: string
      id:
        description: |-
          ID is the DB-assigned numeric server id (exposed as a JSON number). It is
          NOT read from YAML — legacy config.yaml stored string ids, captured by
          LegacyID below for the one-time import remap.
        type: integer
      market_bot_enabled:
        description: |-
          Market bot enable toggle — PER SERVER. The rest of the market-bot config
          (intervals, thresholds, cache base, item data) is global/shared in
          appConfig. nil means "not set" → OFF (explicit opt-in per server).
        type: boolean
      name:
        type: string
      server_ini_dir:
        type: string
      ssh_extra_opts:
        type: string
      ssh_host:
        description: Transport — SSH fields.
        type: string
      ssh_key:
        type: string
      ssh_mode:
        type: string
      ssh_user:
        type: string
    type: object
  main.activityPoint:
    properties:
      count:
        type: integer
      day:
        type: string
    type: object
  main.appConfig:
    properties:
      amp_api_pass:
        type: string
      amp_api_port:
        type: integer
      amp_api_user:
        description: |-
          AMP Web API credentials — let dune-admin manage server settings under AMP
          by writing them through AMP's own config API (Core/SetConfig), so they
          survive AMP regenerating the game INIs. The API is the instance ADS,
          reached in-container at 127.0.0.1:<amp_api_port> (default 8081).
        type: string
      amp_backup_dir:
        type: string
      amp_container:
        type: string
      amp_container_runtime:
        description: |-
          AmpContainerRuntime selects the container CLI used for in-container ops
          (logs/INI/rabbitmqctl) when AmpUseContainer is true: "podman" (default)
          or "docker". Empty → podman, so existing installs are unaffected.
        type: string
      amp_data_root:
        type: string
      amp_instance:
        description: AMP-specific — used when Control == "amp" (CubeCoders AMP w/
          podman).
        type: string
      amp_log_path:
        type: string
      amp_pg_bin:
        description: |-
          DB backup tooling (#150). AmpPgBin/AmpPgLib locate the in-container PG17
          pg_dump/pg_restore + their shared libs; empty → validated AMP defaults.
          AmpBackupDir is the host dir for dumps; empty → <configDir>/db-backups.
        type: string
      amp_pg_lib:
        type: string
      amp_use_container:
        type: boolean
      amp_user:
        type: string
      auth_cookie_samesite:
        description: 'AuthCookieSameSite: "" → Lax; "none" for cross-origin CDN setups
          (TLS only).'
        type: string
      auth_discord_client_id:
        type: string
      auth_discord_client_secret:
        type: string
      auth_discord_enabled:
        description: |-
          Discord OAuth2 login (BYOA). Reuses discord_bot_token + discord_guild_id
          for the membership/role lookup after the OAuth exchange.
        type: boolean
      auth_discord_redirect_url:
        description: |-
          AuthDiscordRedirectURL overrides the OAuth redirect; empty derives
          scheme://host/api/v1/auth/discord/callback from each request.
        type: string
      auth_enabled:
        description: |-
          ── Dashboard authentication ──────────────────────────────────────────
          AuthEnabled turns on login enforcement for the dashboard + API.
          Pointer so "unset" (default-off) is distinguishable from explicit false.
          When off, behavior is identical to releases without auth.
        type: boolean
      auth_guest_enabled:
        description: |-
          AuthGuestEnabled allows anyone to start a read-only "guest" session
          from the login page — no credentials, default read-only capabilities.
        type: boolean
      auth_local_password_hash:
        type: string
      auth_local_password_new:
        description: |-
          AuthLocalPasswordNew is a write-only API field: when present in a saved
          config it is bcrypt-hashed into AuthLocalPasswordHash and discarded.
        type: string
      auth_local_username:
        description: |-
          Local username/password login. The hash is bcrypt; set it via
          `dune-admin --set-password` or the config UI (which sends the plaintext
          in auth_local_password_new and never stores it).
        type: string
      auth_owner_discord_ids:
        description: |-
          Owners get full capabilities regardless of the permissions matrix.
          The guild owner (via Discord API) and the local account are always
          owners; these comma-separated lists add more.
        type: string
      auth_owner_role_ids:
        type: string
      auth_session_ttl_hours:
        type: integer
      auto_discover:
        description: |-
          AutoDiscover: when true, fill empty DB/RMQ/Director fields from the
          running game-server process args at connect time (command-mode + kubectl).
        type: boolean
      backup_dir:
        description: Backups — optional path accessed via the executor.
        type: string
      battlepass_auto_grant:
        type: boolean
      battlepass_award_past:
        type: boolean
      battlepass_enabled:
        description: |-
          ── Battlepass ─────────────────────────────────────────────────────────
          BattlepassEnabled starts the tier-evaluation loop (default off).
          BattlepassAwardPast rewards pre-existing progress on first evaluation;
          default off — old progress is baselined and only new unlocks earn intel.
          IMPORTANT: set award_past=true on the FIRST scan for an account — if
          an account is first scanned with award_past=false, its tiers are written
          as "baseline" permanently and flipping award_past later has no effect.
          To repopulate Pending after changing modes, clear the battlepass_* tables
          in dune-admin.db (or delete the whole file to reset all stores).
          BattlepassScanPaceMs is the inter-player delay (ms) during evaluation;
          0 disables pacing; negative → default 75ms; max 5000ms.
          BattlepassScanStartDelayMs is the delay (ms) before the boot scan so the
          server and DB pool finish warming; 0 is immediate; negative → 3000ms.
          BattlepassAutoGrant (default off) records each newly-earned tier into a
          deferred-grant ledger and delivers it automatically — to online AND
          offline players — retrying with backoff up to deferredGrantMaxAttempts.
          After exhaustion the tier reverts to manual-grant only.
        type: boolean
      battlepass_poll_seconds:
        type: integer
      battlepass_scan_pace_ms:
        type: integer
      battlepass_scan_start_delay_ms:
        type: integer
      broker_admin_addr:
        type: string
      broker_exec_prefix:
        description: |-
          BrokerExecPrefix is prepended to all rabbitmqctl calls. Use when the
          broker runs inside a container that isn't managed by the docker control
          plane — e.g. "podman exec AMP_MehDune01" or "docker exec my-broker".
        type: string
      broker_game_addr:
        description: Broker — optional; if set, notifications and capture are available.
        type: string
      broker_jwt_secret:
        description: |-
          BrokerJWTSecret is the base64-encoded HMAC key used to re-sign
          ServiceAuthTokens for CaptureJWT. Optional override for the baked-in
          default signing key (captureJWTSecretB64).
        type: string
      broker_pass:
        type: string
      broker_tls:
        type: boolean
      broker_user:
        type: string
      cmd_restart:
        type: string
      cmd_start:
        description: local-specific — configurable shell commands
        type: string
      cmd_status:
        type: string
      cmd_stop:
        type: string
      control:
        description: 'Control plane: "kubectl" | "docker" | "local" | "amp"'
        type: string
      control_namespace:
        description: kubectl-specific
        type: string
      db_host:
        description: Database — always required.
        type: string
      db_name:
        type: string
      db_pass:
        type: string
      db_port:
        type: integer
      db_schema:
        type: string
      db_user:
        type: string
      default_ini_dir:
        description: |-
          DefaultIniDir is a local or remote path that contains DefaultGame.ini and
          DefaultEngine.ini — the base layer of the INI hierarchy.
        type: string
      default_server:
        type: string
      default_server_name:
        description: |-
          DefaultServerName is the display name of the legacy flat "default" server,
          so single-server installs can rename it. Blank → "Default".
        type: string
      director_url:
        type: string
      discord_announce_channel_id:
        type: string
      discord_bot_enabled:
        description: |-
          ── Discord bot ────────────────────────────────────────────────────────
          DiscordBotEnabled starts the embedded Discord gateway bot. Pointer so we
          can distinguish "unset" (default-off) from "explicitly false".
        type: boolean
      discord_bot_token:
        type: string
      discord_guild_id:
        type: string
      discord_roles_admin:
        type: string
      discord_roles_economy:
        type: string
      discord_roles_viewer:
        description: Comma-separated Discord role IDs for each capability tier.
        type: string
      discord_status_channel_id:
        type: string
      discord_status_enabled:
        description: |-
          ── Discord status embed (#188) ────────────────────────────────────────
          A persistent, auto-updating embed posted to one channel that the bot edits
          in place every interval. Pointer so "unset" (default-off) is distinct from
          explicit false. The posted message ID is persisted in the unified SQLite
          store (meta table) so restarts edit the same message instead of re-posting.
        type: boolean
      discord_status_interval_seconds:
        type: integer
      docker_broker_admin:
        type: string
      docker_broker_game:
        type: string
      docker_db:
        type: string
      docker_gameserver:
        description: docker-specific — container names
        type: string
      events_enabled:
        description: |-
          ── Live events engine ─────────────────────────────────────────────────
          EventsEnabled starts the background polling engine. Per-event poll_seconds
          and jitter_seconds are configured on each event definition.
        type: boolean
      listen_addr:
        type: string
      market_bot_buy_interval:
        type: string
      market_bot_buy_threshold:
        type: number
      market_bot_cache_db:
        type: string
      market_bot_enabled:
        description: |-
          ── Embedded market bot ────────────────────────────────────────────────
          MarketBotEnabled starts the market bot as an in-process goroutine.
          Pointer so we can distinguish "unset" (default-on) from "explicitly false".
        type: boolean
      market_bot_item_data:
        type: string
      market_bot_list_interval:
        type: string
      market_bot_max_buys:
        type: integer
      market_bot_remote_token:
        type: string
      market_bot_remote_url:
        type: string
      market_bot_state:
        type: string
      scrip_currency:
        type: integer
      server_ini_dir:
        description: ServerIniDir is the directory containing UserGame.ini and UserOverrides.ini.
        type: string
      servers:
        description: |-
          Multi-server: when Servers is non-empty, connectAll is replaced by
          connectMultiServer which calls connectServer for each entry. DefaultServer
          names the initially-active server; if blank the first entry is used.
          Existing flat-config installs (no servers: key) are unaffected.
        items:
          $ref: '#/definitions/main.ServerConfig'
        type: array
      ssh_extra_opts:
        type: string
      ssh_host:
        description: |-
          Transport — SSH fields. If ssh_host is set all commands + TCP connections
          tunnel through SSH. If omitted everything runs/connects locally.
        type: string
      ssh_key:
        type: string
      ssh_mode:
        description: |-
          SSHMode selects the SSH transport: "" / "library" uses golang.org/x/crypto/ssh
          (default); "command" shells out to the OS ssh client (honours ~/.ssh/config,
          ProxyJump, ssh-agent; never reads a private key).
        type: string
      ssh_user:
        type: string
      welcome_package_active_version:
        type: string
      welcome_package_enabled:
        description: |-
          ── Welcome package ────────────────────────────────────────────────────
          Auto-grants a configured item package to every player once, on first
          login. Defaults OFF — it mutates every player's inventory, so it must be
          explicitly opted into. Bump the version to re-issue to everyone.
        type: boolean
      welcome_package_items:
        items:
          $ref: '#/definitions/main.welcomePackageItem'
        type: array
      welcome_package_scan_interval_secs:
        type: integer
      welcome_package_version:
        description: Legacy pre-library fields, migrated into WelcomePackages on load.
        type: string
      welcome_packages:
        items:
          $ref: '#/definitions/main.welcomePackage'
        type: array
    type: object
